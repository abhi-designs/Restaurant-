<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demo Food Hub - Pro POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .active-nav { background: #2563eb; color: white; border-radius: 8px; }
        .h-screen-fix { height: 100vh; height: 100dvh; }
        .kanban-col { height: 100%; min-width: 220px; overflow-y: auto; background: #f1f5f9; padding: 10px; border-radius: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .show-modal { display: flex; }
        .dish-btn { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; }
        .dish-btn:active { transform: scale(0.95); background: #eff6ff; }
        
        /* Custom Notification Design */
        #toast {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(-50%, -150%);
        }
        #toast.show { transform: translate(-50%, 20px); opacity: 1; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen-fix overflow-hidden font-sans text-slate-800">

    <!-- CUSTOM TOAST NOTIFICATION -->
    <div id="toast" class="fixed top-0 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 border border-blue-500/30">
            <div class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-check text-[10px] text-white"></i>
            </div>
            <span id="toast-msg" class="text-[10px] font-black uppercase tracking-widest italic">Order Sent!</span>
        </div>
    </div>

    <!-- LEFT NAVBAR -->
    <aside class="w-16 md:w-56 bg-slate-900 text-white flex flex-col p-3 shrink-0">
        <div class="flex flex-col items-center mb-8 border-b border-slate-700 pb-4">
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center mb-2 shadow-lg ring-2 ring-blue-400">
                <i class="fa-solid fa-utensils text-white text-lg"></i>
            </div>
            <div class="text-[9px] font-black text-white hidden md:block uppercase tracking-widest text-center italic">Demo Food Hub</div>
        </div>
        
        <nav class="flex flex-col gap-2 flex-1">
            <button onclick="showView('pos')" id="nav-pos" class="flex items-center justify-center md:justify-start gap-3 p-3 active-nav">
                <i class="fa-solid fa-plus-square text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Take Order</span>
            </button>
            <button onclick="showView('kitchen')" id="nav-kitchen" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-fire-burner text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Kitchen TV</span>
            </button>
            <button onclick="showView('billing')" id="nav-billing" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-receipt text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Billing</span>
            </button>
            <button onclick="showView('menu-man')" id="nav-menu-man" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-list-check text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Menu Manager</span>
            </button>
            <button onclick="showView('insights')" id="nav-insights" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-chart-line text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Insights</span>
            </button>
        </nav>
    </aside>

    <!-- MAIN AREA -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-12 bg-white border-b px-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <h2 id="view-title" class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">DEMO FOOD HUB</h2>
            </div>
            <div class="font-black text-blue-600 text-xs">Rev: ₹<span id="header-rev">0</span></div>
        </header>

        <!-- POS VIEW -->
        <section id="view-pos" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <div class="flex-1 p-3 overflow-y-auto grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2 content-start" id="menu-grid"></div>
            <div class="w-full lg:w-72 border-t lg:border-t-0 lg:border-l bg-white flex flex-col h-1/2 lg:h-full shadow-lg">
                <div class="p-2 bg-slate-50 border-b font-black text-[9px] text-slate-400 uppercase flex justify-between items-center">
                    <span>Active Cart</span>
                    <button onclick="clearCart()" class="text-red-400 text-[8px] border border-red-200 px-2 rounded">Reset</button>
                </div>
                <div id="cart-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
                <div class="p-3 border-t bg-white">
                    <div class="flex justify-between font-black text-sm mb-2 uppercase"><span>Total Bill</span><span>₹<span id="cart-total">0</span></span></div>
                    <button onclick="openTableModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md">Assign Table</button>
                </div>
            </div>
        </section>

        <!-- MENU MANAGER -->
        <section id="view-menu-man" class="hidden flex-1 p-4 overflow-y-auto bg-white">
            <h3 class="font-black text-sm mb-6 uppercase tracking-widest text-blue-600 italic underline underline-offset-8 decoration-blue-200">Menu Library</h3>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-8 max-w-md">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-3">Add New Dish Item</p>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="Dish Name" class="flex-1 p-2 text-xs border rounded-lg focus:outline-blue-500">
                    <input id="new-price" type="number" placeholder="₹" class="w-20 p-2 text-xs border rounded-lg focus:outline-blue-500">
                    <button onclick="addNewDish()" class="bg-blue-600 text-white px-5 rounded-lg font-black text-xs hover:bg-blue-700">+</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="menu-edit-list"></div>
        </section>

        <!-- KITCHEN TV -->
        <section id="view-kitchen" class="hidden flex-1 p-3 overflow-x-auto bg-slate-200">
            <div class="flex gap-3 h-full pb-4">
                <div class="flex-1"><p class="text-[9px] font-black mb-1 text-slate-500 text-center uppercase">Pending</p><div id="col-pending" class="kanban-col space-y-2"></div></div>
                <div class="flex-1"><p class="text-[9px] font-black mb-1 text-slate-500 text-center uppercase">Chef Cooking</p><div id="col-preparing" class="kanban-col space-y-2"></div></div>
                <div class="flex-1"><p class="text-[9px] font-black mb-1 text-slate-500 text-center uppercase">Order Ready</p><div id="col-ready" class="kanban-col space-y-2"></div></div>
                <div class="flex-1 opacity-50"><p class="text-[9px] font-black mb-1 text-slate-500 text-center uppercase">Served</p><div id="col-served" class="kanban-col space-y-2"></div></div>
            </div>
        </section>

        <!-- BILLING -->
        <section id="view-billing" class="hidden flex-1 p-4 lg:p-8 flex flex-col lg:flex-row gap-6 overflow-y-auto bg-slate-50">
            <div class="w-full lg:w-64 space-y-2" id="bill-table-list"></div>
            <div id="bill-panel" class="flex-1 bg-white border rounded-3xl p-8 shadow-sm flex items-center justify-center text-slate-300 italic">No bill selected</div>
        </section>

        <!-- INSIGHTS -->
        <section id="view-insights" class="hidden flex-1 p-6 overflow-y-auto bg-white">
            <div class="bg-slate-900 text-white p-6 rounded-2xl mb-6 shadow-xl border border-blue-500/20">
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Today's Net Profit</p>
                <h1 class="text-4xl font-black italic text-blue-400">₹<span id="ins-total">0</span></h1>
            </div>
            <table class="w-full text-left text-[9px] bg-slate-50 rounded-xl overflow-hidden shadow-sm">
                <thead class="bg-slate-200 font-black"><tr><th class="p-4 uppercase">Table</th><th class="p-4 uppercase">Summary</th><th class="p-4 uppercase">Paid</th></tr></thead>
                <tbody id="settle-history"></tbody>
            </table>
        </section>
    </main>

    <!-- ASSIGN TABLE MODAL -->
    <div id="table-modal" class="modal">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-xs mx-4">
            <h4 class="text-center font-black text-[10px] mb-4 text-slate-400 uppercase tracking-widest italic">Assign to Table No.</h4>
            <div class="grid grid-cols-3 gap-2" id="modal-table-grid"></div>
            <button onclick="closeModal()" class="w-full mt-6 text-slate-400 text-[10px] font-bold uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        let menu = [{name:"Masala Dosa",price:120},{name:"Butter Pav Bhaji",price:140},{name:"Cheese Dosa",price:180},{name:"Paneer Pulao",price:130}];
        let cart = []; let orders = []; let history = []; let dailyRev = 0;

        // --- TOAST NOTIFICATION LOGIC ---
        function triggerToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            toast.classList.add('show', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('show', 'opacity-100');
            }, 3000);
        }

        function showView(v) {
            ['pos','kitchen','billing','insights','menu-man'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('nav-'+v).classList.add('active-nav');
            if(v === 'billing') renderBilling();
            if(v === 'insights') renderInsights();
            if(v === 'menu-man') renderMenuEditList();
            document.getElementById('view-title').innerText = "DEMO HUB | " + v.toUpperCase();
        }

        // --- MENU & POS ---
        function renderPOS() {
            document.getElementById('menu-grid').innerHTML = menu.map((m,i)=>`
                <div onclick="addToCart(${i})" class="dish-btn bg-white p-3 rounded-xl text-center shadow-sm">
                    <p class="font-bold text-[9px] uppercase h-6 overflow-hidden mb-1 leading-tight">${m.name}</p>
                    <p class="text-blue-600 font-black text-xs">₹${m.price}</p>
                </div>`).join('');
        }

        function renderMenuEditList() {
            document.getElementById('menu-edit-list').innerHTML = menu.map((m,i)=>`
                <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-black text-xs uppercase">${m.name}</p>
                        <p class="text-[10px] text-blue-600 font-bold italic">₹${m.price}</p>
                    </div>
                    <button onclick="removeDish(${i})" class="text-slate-300 hover:text-red-500 p-2 transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>`).join('');
        }

        function addNewDish() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            if(!name || !price) return;
            menu.push({name: name, price: parseInt(price)});
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
            renderMenuEditList(); renderPOS();
            triggerToast("Dish Added to Library!");
        }

        function removeDish(index) {
            menu.splice(index, 1);
            renderMenuEditList(); renderPOS();
            triggerToast("Dish Removed!");
        }

        function addToCart(i) { cart.push(menu[i]); updateCart(); }
        function updateCart() {
            document.getElementById('cart-list').innerHTML = cart.map(c=>`<div class="flex justify-between p-1.5 border-b text-[9px] font-black bg-white rounded mb-1"><span>${c.name}</span><span>₹${c.price}</span></div>`).join('');
            document.getElementById('cart-total').innerText = cart.reduce((s,i)=>s+i.price, 0);
        }
        function clearCart() { cart = []; updateCart(); }

        function openTableModal() {
            if(!cart.length) return triggerToast("Cart is Empty!");
            document.getElementById('modal-table-grid').innerHTML = Array.from({length:12}, (_,i)=>{
                const tName = `T${i+1}`;
                const isBusy = orders.some(o => o.table === tName);
                const color = isBusy ? 'bg-orange-50 text-orange-500' : 'bg-slate-50 text-slate-700';
                return `<button onclick="placeOrder(${i+1})" class="${color} p-4 rounded-xl font-black text-sm shadow-sm border border-slate-100 transition">${tName}</button>`;
            }).join('');
            document.getElementById('table-modal').classList.add('show-modal');
        }

        function closeModal() { document.getElementById('table-modal').classList.remove('show-modal'); }

        function placeOrder(tNo) {
            const tableName = `T${tNo}`;
            orders.push({ id:Date.now(), table: tableName, items:[...cart], status:'pending' });
            cart=[]; updateCart(); closeModal(); renderKitchen();
            triggerToast(`Order Sent for Table ${tableName}!`);
        }

        // --- KITCHEN & BILLING ---
        function renderKitchen() {
            ['pending','preparing','ready','served'].forEach(id => document.getElementById('col-'+id).innerHTML = '');
            orders.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl border-l-4 border-blue-600 shadow-sm text-[10px]";
                card.innerHTML = `<div class="font-black mb-1 uppercase italic">${o.table}</div><p class="text-slate-400 font-bold mb-3 uppercase tracking-tighter">${o.items.map(i=>i.name).join(', ')}</p>
                    ${o.status!=='served' ? `<button onclick="nextStatus(${o.id})" class="w-full bg-slate-900 text-white p-2 rounded-lg font-black text-[9px] uppercase tracking-widest">Next State</button>` : '<b class="text-green-500 italic">Served ✓</b>'}`;
                document.getElementById('col-'+o.status).appendChild(card);
            });
        }

        function nextStatus(id) {
            const o = orders.find(x=>x.id===id);
            const flow = {pending:'preparing', preparing:'ready', ready:'served'};
            o.status = flow[o.status];
            renderKitchen();
        }

        function renderBilling() {
            const list = document.getElementById('bill-table-list');
            const served = orders.filter(o => o.status === 'served');
            const uniqueTables = [...new Set(served.map(o => o.table))];
            if(!uniqueTables.length) return list.innerHTML = "<p class='text-[10px] text-slate-300 italic py-10 text-center font-black uppercase tracking-widest'>No Payments Pending</p>";
            list.innerHTML = uniqueTables.map(t => `<button onclick="showBill('${t}')" class="w-full bg-white border-2 border-transparent p-4 rounded-xl text-left font-black text-xs hover:border-blue-500 shadow-sm transition"><i class="fa-solid fa-receipt text-blue-500 mr-2"></i> ${t} MERGED INVOICE</button>`).join('');
        }

        function showBill(tName) {
            const tableOrders = orders.filter(o => o.table === tName && o.status === 'served');
            let items = []; tableOrders.forEach(o => items.push(...o.items));
            const sub = items.reduce((s,i)=>s+i.price, 0); const gst = Math.round(sub * 0.05);
            document.getElementById('bill-panel').innerHTML = `
                <div class="w-full max-w-sm bg-white p-8 rounded-[40px] shadow-2xl border">
                    <h3 class="text-2xl font-black mb-1 italic text-blue-600 text-center">Demo Food Hub</h3>
                    <p class="text-[9px] font-black text-slate-400 mb-6 uppercase tracking-widest text-center">${tName} Final Bill</p>
                    <div class="space-y-1 mb-6 border-b pb-4 max-h-32 overflow-y-auto">${items.map(i=>`<div class="flex justify-between text-[11px] font-bold"><span>${i.name}</span><span>₹${i.price}</span></div>`).join('')}</div>
                    <div class="text-right text-[10px] mb-8 font-black text-slate-400 uppercase tracking-widest"><p>Sub: ₹${sub}</p><p>GST: ₹${gst}</p><h2 class="text-3xl font-black text-blue-600 mt-2 italic tracking-tighter">Total: ₹${sub+gst}</h2></div>
                    <button onclick="settle('${tName}', ${sub+gst})" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-black transition">Settle Bill</button>
                </div>`;
        }

        function settle(tName, total) {
            const tableOrders = orders.filter(o => o.table === tName && o.status === 'served');
            let summary = []; tableOrders.forEach(o => summary.push(...o.items.map(i=>i.name)));
            history.push({ table:tName, items:summary.join(', '), total:total });
            dailyRev += total;
            document.getElementById('header-rev').innerText = dailyRev;
            orders = orders.filter(o => !(o.table === tName && o.status === 'served'));
            document.getElementById('bill-panel').innerHTML = `<div class="text-green-500 font-black text-center py-10 italic">SETTLEMENT COMPLETE ✓</div>`;
            renderBilling(); triggerToast(`${tName} Bill Paid!`);
        }

        function renderInsights() {
            document.getElementById('ins-total').innerText = dailyRev;
            document.getElementById('ins-gst').innerText = Math.round(dailyRev * 0.05);
            document.getElementById('ins-count').innerText = history.length;
            document.getElementById('settle-history').innerHTML = history.map(h => `<tr class="border-b"><td class="p-4 font-black italic uppercase">${h.table}</td><td class="p-4 text-slate-400 font-bold uppercase tracking-tighter">${h.items}</td><td class="p-4 font-black text-blue-600">₹${h.total}</td></tr>`).join('');
        }

        renderPOS();
        showView('pos');
    </script>
</body>
</html>
