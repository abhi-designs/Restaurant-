<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Food Hub - Professional POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .active-nav { background: #2563eb; color: white; border-radius: 8px; }
        .kanban-col { height: calc(100vh - 180px); min-width: 220px; overflow-y: auto; background: #f1f5f9; padding: 10px; border-radius: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .show-modal { display: flex; }
        .dish-btn { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; }
        .dish-btn:active { transform: scale(0.95); background: #eff6ff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans text-slate-800">

    <!-- LEFT NAVBAR -->
    <aside class="w-16 md:w-56 bg-slate-900 text-white flex flex-col p-3 shrink-0">
        <div class="flex flex-col items-center mb-8 border-b border-slate-700 pb-4">
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center mb-2 shadow-lg ring-2 ring-blue-400">
                <i class="fa-solid fa-utensils text-white text-lg"></i>
            </div>
            <div class="text-[10px] font-black text-white hidden md:block uppercase tracking-widest text-center italic">
                Demo Food Hub
            </div>
        </div>
        
        <nav class="flex flex-col gap-2 flex-1">
            <button onclick="showView('pos')" id="nav-pos" class="flex items-center justify-center md:justify-start gap-3 p-3 active-nav">
                <i class="fa-solid fa-plus-square text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Take Order</span>
            </button>
            <button onclick="showView('kitchen')" id="nav-kitchen" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-fire-burner text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Kitchen TV</span>
            </button>
            <button onclick="showView('billing')" id="nav-billing" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-receipt text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Billing</span>
            </button>
            <button onclick="showView('menu-man')" id="nav-menu-man" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-list-check text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Menu Manager</span>
            </button>
            <button onclick="showView('insights')" id="nav-insights" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-chart-line text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Reports</span>
            </button>
        </nav>
    </aside>

    <!-- MAIN AREA -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- UPDATED HEADER -->
        <header class="h-12 bg-white border-b px-6 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <!-- TEXT REPLACED HERE -->
                <h2 id="view-title" class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">
                    DEMO FOOD HUB
                </h2>
            </div>
            <div class="font-black text-blue-600 text-sm italic">Daily Revenue: ₹<span id="header-rev">0</span></div>
        </header>

        <!-- VIEW: POS -->
        <section id="view-pos" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <div class="flex-1 p-4 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 content-start" id="menu-grid"></div>
            <div class="w-full lg:w-64 border-t lg:border-t-0 lg:border-l bg-white flex flex-col h-72 lg:h-full shadow-xl">
                <div class="p-3 bg-slate-50 border-b font-black text-[9px] text-slate-400 uppercase">Cart</div>
                <div id="cart-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
                <div class="p-3 border-t">
                    <div class="flex justify-between font-black text-sm mb-3 uppercase"><span>Total</span><span>₹<span id="cart-total">0</span></span></div>
                    <button onclick="openTableModal()" class="w-full bg-slate-900 text-white py-3 rounded font-black text-[10px] uppercase tracking-widest">Assign Table</button>
                </div>
            </div>
        </section>

        <!-- VIEW: KITCHEN TV -->
        <section id="view-kitchen" class="hidden flex-1 p-4 overflow-x-auto bg-slate-200">
            <div class="flex gap-4 h-full">
                <div class="flex-1"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Pending</p><div id="col-pending" class="kanban-col space-y-2"></div></div>
                <div class="flex-1"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Preparing</p><div id="col-preparing" class="kanban-col space-y-2"></div></div>
                <div class="flex-1"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Ready</p><div id="col-ready" class="kanban-col space-y-2"></div></div>
                <div class="flex-1 opacity-50"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Served</p><div id="col-served" class="kanban-col space-y-2"></div></div>
            </div>
        </section>

        <!-- VIEW: BILLING -->
        <section id="view-billing" class="hidden flex-1 p-4 lg:p-8 flex flex-col lg:flex-row gap-6 overflow-y-auto bg-slate-50">
            <div class="w-full lg:w-64 space-y-2" id="bill-table-list"></div>
            <div id="bill-panel" class="flex-1 bg-white border rounded-2xl p-8 shadow-sm flex items-center justify-center text-slate-300 italic">
                Select a table to settle merged bill
            </div>
        </section>

        <!-- VIEW: REPORTS -->
        <section id="view-insights" class="hidden flex-1 p-8 overflow-y-auto bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-lg">
                    <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Total Sales</p>
                    <h1 class="text-4xl font-black text-blue-400 italic">₹<span id="ins-total">0</span></h1>
                </div>
                <div class="bg-white border p-6 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Tax Collected (5%)</p>
                    <h1 class="text-4xl font-black text-green-600">₹<span id="ins-gst">0</span></h1>
                </div>
                <div class="bg-white border p-6 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Settle Events</p>
                    <h1 class="text-4xl font-black" id="ins-count">0</h1>
                </div>
            </div>
            <table class="w-full text-left text-[10px] bg-slate-50 rounded-xl">
                <thead class="bg-slate-200 uppercase font-black text-slate-600"><tr><th class="p-4">Table</th><th class="p-4">Dishes</th><th class="p-4">Final Amount</th></tr></thead>
                <tbody id="settle-history"></tbody>
            </table>
        </section>

        <!-- VIEW: MENU MANAGER -->
        <section id="view-menu-man" class="hidden flex-1 p-8">
            <div class="bg-white p-4 rounded-xl border max-w-sm mb-6 shadow-sm">
                <h4 class="font-black text-[9px] mb-3 text-slate-400 uppercase">Add New Item</h4>
                <div class="flex gap-2">
                    <input id="in-name" type="text" placeholder="Dish Name" class="border p-2 rounded flex-1 text-xs">
                    <input id="in-price" type="number" placeholder="₹" class="border p-2 rounded w-16 text-xs">
                    <button onclick="addDish()" class="bg-blue-600 text-white px-4 rounded font-black text-[10px]">ADD</button>
                </div>
            </div>
            <div id="full-menu-list" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
        </section>
    </main>

    <!-- TABLE MODAL -->
    <div id="table-modal" class="modal">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-xs mx-4">
            <h4 class="text-center font-black text-[10px] mb-4 text-slate-400 uppercase tracking-widest italic">Assign Table</h4>
            <div class="grid grid-cols-3 gap-2" id="modal-table-grid"></div>
            <button onclick="closeModal()" class="w-full mt-6 text-slate-400 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script>
        let menu = [{name:"Masala Dosa",price:120},{name:"Butter Pav Bhaji",price:140},{name:"Cheese Dosa",price:180},{name:"Paneer Pulao",price:130}];
        let cart = []; let orders = []; let history = []; let dailyRev = 0;

        // UPDATED JS: Keeps Restaurant name in header
        function showView(v) {
            ['pos','kitchen','billing','insights','menu-man'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('nav-'+v).classList.add('active-nav');
            
            // Updates title to: NAME | VIEW
            document.getElementById('view-title').innerText = "DEMO FOOD HUB | " + v.toUpperCase();
            
            if(v === 'billing') renderBilling();
            if(v === 'insights') renderInsights();
            if(v === 'menu-man') renderMenuMan();
        }

        function renderPOS() {
            document.getElementById('menu-grid').innerHTML = menu.map((m,i)=>`
                <div onclick="addToCart(${i})" class="dish-btn bg-white p-2.5 rounded-lg text-center shadow-sm">
                    <p class="font-bold text-[9px] uppercase h-6 overflow-hidden mb-1">${m.name}</p>
                    <p class="text-blue-600 font-black text-xs">₹${m.price}</p>
                </div>`).join('');
        }
        function addToCart(i) { cart.push(menu[i]); updateCart(); }
        function updateCart() {
            document.getElementById('cart-list').innerHTML = cart.map(c=>`<div class="flex justify-between p-1.5 border-b text-[9px] font-black bg-white rounded mb-1"><span>${c.name}</span><span>₹${c.price}</span></div>`).join('');
            document.getElementById('cart-total').innerText = cart.reduce((s,i)=>s+i.price, 0);
        }
        function openTableModal() {
            if(!cart.length) return;
            document.getElementById('modal-table-grid').innerHTML = Array.from({length:12}, (_,i)=>{
                const tName = `T${i+1}`;
                const isOccupied = orders.some(o => o.table === tName);
                const color = isOccupied ? 'bg-orange-100 text-orange-600' : 'bg-slate-50 text-slate-700';
                return `<button onclick="placeOrder(${i+1})" class="${color} p-4 rounded-xl font-black text-sm hover:bg-blue-600 hover:text-white shadow-sm border border-slate-100 transition">${tName}</button>`;
            }).join('');
            document.getElementById('table-modal').classList.add('show-modal');
        }
        function closeModal() { document.getElementById('table-modal').classList.remove('show-modal'); }
        function placeOrder(tNo) {
            orders.push({ id:Date.now(), table:`T${tNo}`, items:[...cart], status:'pending' });
            cart=[]; updateCart(); closeModal(); renderKitchen();
        }
        function renderKitchen() {
            ['pending','preparing','ready','served'].forEach(id => document.getElementById('col-'+id).innerHTML = '');
            orders.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl border-l-4 border-blue-600 shadow-sm text-[10px]";
                card.innerHTML = `<div class="font-black mb-1 uppercase">${o.table}</div><p class="text-slate-400 font-bold mb-3 uppercase">${o.items.map(i=>i.name).join(', ')}</p>
                    ${o.status!=='served' ? `<button onclick="nextStatus(${o.id})" class="w-full bg-slate-900 text-white p-2 rounded-lg font-black text-[9px] uppercase tracking-widest">Push Next</button>` : '<b class="text-green-600 italic">Served ✓</b>'}`;
                document.getElementById('col-'+o.status).appendChild(card);
            });
        }
        function nextStatus(id) {
            const o = orders.find(x=>x.id===id);
            const flow = {pending:'preparing', preparing:'ready', ready:'served'};
            o.status = flow[o.status];
            renderKitchen();
        }
        function renderBilling() {
            const list = document.getElementById('bill-table-list');
            const served = orders.filter(o => o.status === 'served');
            const uniqueTables = [...new Set(served.map(o => o.table))];
            if(!uniqueTables.length) return list.innerHTML = "<p class='text-[10px] text-slate-300 italic py-10 text-center font-black uppercase tracking-widest'>No Bills Ready</p>";
            list.innerHTML = uniqueTables.map(t => `<button onclick="showBill('${t}')" class="w-full bg-white border-2 border-transparent p-4 rounded-xl text-left font-black text-xs hover:border-blue-500 shadow-sm transition"><i class="fa-solid fa-receipt text-blue-500 mr-2"></i> ${t} MERGED BILL</button>`).join('');
        }
        function showBill(tName) {
            const tableOrders = orders.filter(o => o.table === tName && o.status === 'served');
            let items = []; tableOrders.forEach(o => items.push(...o.items));
            const sub = items.reduce((s,i)=>s+i.price, 0); const gst = Math.round(sub * 0.05);
            document.getElementById('bill-panel').innerHTML = `
                <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl border">
                    <h3 class="text-xl font-black mb-1 uppercase tracking-tighter italic text-blue-600">Demo Food Hub</h3>
                    <p class="text-[9px] font-black text-slate-400 mb-6 uppercase tracking-widest italic">${tName} Bill</p>
                    <div class="space-y-1 mb-6 border-b pb-4">${items.map(i=>`<div class="flex justify-between text-[11px] font-bold"><span>${i.name}</span><span>₹${i.price}</span></div>`).join('')}</div>
                    <div class="text-right text-[10px] mb-8 font-black text-slate-400 uppercase tracking-widest"><p>Sub: ₹${sub}</p><p>Tax (5%): ₹${gst}</p><h2 class="text-3xl font-black text-blue-600 mt-2 italic tracking-tighter">Total: ₹${sub+gst}</h2></div>
                    <button onclick="settle('${tName}', ${sub+gst})" class="w-full bg-green-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-green-700">Settle & Reset Table</button>
                </div>`;
        }
        function settle(tName, total) {
            const tableOrders = orders.filter(o => o.table === tName && o.status === 'served');
            let itemSummary = []; tableOrders.forEach(o => itemSummary.push(...o.items.map(i=>i.name)));
            history.push({ table:tName, items:itemSummary.join(', '), total:total });
            dailyRev += total;
            document.getElementById('header-rev').innerText = dailyRev;
            orders = orders.filter(o => !(o.table === tName && o.status === 'served'));
            document.getElementById('bill-panel').innerHTML = `<div class="text-green-500 font-black text-xl italic animate-pulse text-center">TABLE RESET ✓</div>`;
            renderBilling();
        }
        function renderInsights() {
            document.getElementById('ins-total').innerText = dailyRev;
            document.getElementById('ins-gst').innerText = Math.round(dailyRev * 0.05);
            document.getElementById('ins-count').innerText = history.length;
            document.getElementById('settle-history').innerHTML = history.map(h => `<tr class="border-b"><td class="p-4 font-black italic">${h.table}</td><td class="p-4 text-slate-400 font-bold uppercase tracking-tighter">${h.items}</td><td class="p-4 font-black text-blue-600">₹${h.total}</td></tr>`).join('');
        }
        function addDish() {
            const n = document.getElementById('in-name').value; const p = document.getElementById('in-price').value;
            if(!n || !p) return; menu.push({name:n, price:parseInt(p)});
            document.getElementById('in-name').value=''; document.getElementById('in-price').value='';
            renderPOS(); renderMenuMan();
        }
        function renderMenuMan() {
            document.getElementById('full-menu-list').innerHTML = menu.map(m=>`<div class="bg-white p-3 rounded-xl border flex justify-between text-[10px] font-black uppercase italic"><span>${m.name}</span><span class="text-blue-600">₹${m.price}</span></div>`).join('');
        }

        renderPOS();
        showView('pos');
    </script>
</body>
</html>
