<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demo Food Hub - Professional Cloud POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FIREBASE SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, set, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      // --- PASTE YOUR FIREBASE SETTINGS HERE ---
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "https://restaurants-3604b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      window.db = db; window.dbRef = ref; window.dbSet = set; window.dbPush = push; 
      window.dbOnValue = onValue; window.dbUpdate = update; window.dbRemove = remove;
    </script>

    <style>
        .active-nav { background: #2563eb; color: white; border-radius: 8px; }
        .h-screen-fix { height: 100vh; height: 100dvh; }
        .kanban-col { height: calc(100vh - 180px); min-width: 240px; overflow-y: auto; background: #f1f5f9; padding: 10px; border-radius: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .show-modal { display: flex; }
        .dish-btn { transition: all 0.1s; border: 1px solid #e2e8f0; cursor: pointer; }
        .dish-btn:active { transform: scale(0.95); background: #eff6ff; }
        #toast { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translate(-50%, -150%); }
        #toast.show { transform: translate(-50%, 20px); opacity: 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen-fix overflow-hidden font-sans text-slate-800">

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed top-0 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none">
        <div class="bg-slate-900 text-white px-6 py-2 rounded-full shadow-2xl flex items-center gap-3 border border-blue-500/30">
            <span id="toast-msg" class="text-[9px] font-black uppercase tracking-widest italic tracking-widest">Success</span>
        </div>
    </div>

    <!-- LEFT NAVBAR -->
    <aside class="w-16 md:w-56 bg-slate-900 text-white flex flex-col p-3 shrink-0">
        <div class="flex flex-col items-center mb-8 border-b border-slate-700 pb-4">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center mb-2 shadow-lg ring-2 ring-blue-400">
                <i class="fa-solid fa-utensils text-white text-lg"></i>
            </div>
            <div class="text-[9px] font-black text-white hidden md:block uppercase tracking-widest text-center italic">Demo Food Hub</div>
        </div>
        
        <nav class="flex flex-col gap-2 flex-1">
            <button onclick="showView('pos')" id="nav-pos" class="flex items-center justify-center md:justify-start gap-3 p-3 active-nav">
                <i class="fa-solid fa-plus-square text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Order</span>
            </button>
            <button onclick="showView('kitchen')" id="nav-kitchen" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-fire-burner text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Kitchen TV</span>
            </button>
            <button onclick="showView('billing')" id="nav-billing" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-receipt text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Billing</span>
            </button>
            <button onclick="showView('menu-man')" id="nav-menu-man" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-list-check text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Menu Man</span>
            </button>
            <button onclick="showView('insights')" id="nav-insights" class="flex items-center justify-center md:justify-start gap-3 p-3 text-slate-400">
                <i class="fa-solid fa-chart-line text-lg"></i> <span class="hidden md:block text-[10px] font-black uppercase tracking-widest">Insights</span>
            </button>
        </nav>
    </aside>

    <!-- MAIN AREA -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-12 bg-white border-b px-6 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-2">
                <span id="cloud-status" class="w-2 h-2 bg-slate-300 rounded-full animate-pulse"></span>
                <h2 id="view-title" class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">DEMO FOOD HUB</h2>
            </div>
            <div class="font-black text-blue-600 text-xs italic tracking-tighter">Live Rev: ₹<span id="header-rev">0</span></div>
        </header>

        <!-- VIEW: POS -->
        <section id="view-pos" class="flex flex-col lg:flex-row flex-1 overflow-hidden">
            <div class="flex-1 p-3 overflow-y-auto grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2 content-start" id="menu-grid"></div>
            
            <div class="w-full lg:w-64 border-t lg:border-t-0 lg:border-l bg-white flex flex-col h-1/2 lg:h-full shadow-xl relative">
                <div class="p-3 bg-slate-50 border-b font-black text-[9px] text-slate-400 uppercase flex justify-between">
                    <span>Cart Items</span>
                    <button onclick="clearCart()" class="text-red-400 hover:text-red-600">Clear</button>
                </div>
                <div id="cart-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
                <div class="p-4 border-t bg-white">
                    <div class="flex justify-between font-black text-sm mb-3 uppercase tracking-tighter"><span>Total</span><span>₹<span id="cart-total">0</span></span></div>
                    <button onclick="openTableModal()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition">Assign to Table</button>
                </div>
            </div>
        </section>

        <!-- VIEW: KITCHEN TV (WITH CANCEL) -->
        <section id="view-kitchen" class="hidden flex-1 p-4 overflow-x-auto bg-slate-200">
            <div class="flex gap-4 h-full pb-4">
                <div class="flex-1"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Pending</p><div id="col-pending" class="kanban-col space-y-2"></div></div>
                <div class="flex-1"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Chef</p><div id="col-preparing" class="kanban-col space-y-2"></div></div>
                <div class="flex-1"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Ready</p><div id="col-ready" class="kanban-col space-y-2"></div></div>
                <div class="flex-1 opacity-50"><p class="text-[9px] font-black mb-2 text-slate-500 uppercase text-center">Served</p><div id="col-served" class="kanban-col space-y-2"></div></div>
            </div>
        </section>

        <!-- VIEW: BILLING -->
        <section id="view-billing" class="hidden flex-1 p-4 lg:p-8 flex flex-col lg:flex-row gap-6 overflow-y-auto bg-slate-50">
            <div class="w-full lg:w-64 space-y-2" id="bill-table-list"></div>
            <div id="bill-panel" class="flex-1 bg-white border rounded-3xl p-8 shadow-sm flex items-center justify-center text-slate-300 italic">Select table from left to view merged bill</div>
        </section>

        <!-- VIEW: MENU MANAGER (WITH DELETE) -->
        <section id="view-menu-man" class="hidden flex-1 p-4 lg:p-8 overflow-y-auto bg-white">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-8 max-w-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-3 italic tracking-widest">Add New Cloud Dish</p>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="Dish Name" class="flex-1 p-2 text-xs border rounded-lg focus:outline-blue-500">
                    <input id="new-price" type="number" placeholder="₹" class="w-16 p-2 text-xs border rounded-lg focus:outline-blue-500">
                    <button onclick="addDishToCloud()" class="bg-blue-600 text-white px-5 rounded-lg font-black text-xs hover:bg-blue-700">+</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3" id="menu-man-list"></div>
        </section>

        <!-- VIEW: INSIGHTS -->
        <section id="view-insights" class="hidden flex-1 p-8 overflow-y-auto bg-white">
            <div class="bg-slate-900 text-white p-6 rounded-2xl mb-6 shadow-xl border border-blue-500/20">
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Cloud Total Collection</p>
                <h1 class="text-4xl font-black italic text-blue-400">₹<span id="ins-total">0</span></h1>
            </div>
            <table class="w-full text-left text-[9px] bg-slate-50 rounded-xl overflow-hidden shadow-sm">
                <thead class="bg-slate-200 font-black"><tr><th class="p-4 uppercase">Table No.</th><th class="p-4 uppercase">Items History</th><th class="p-4 uppercase">Total Bill</th></tr></thead>
                <tbody id="settle-history"></tbody>
            </table>
        </section>
    </main>

    <!-- TABLE SELECTION MODAL (CLEAR TABLE NO. GRID) -->
    <div id="table-modal" class="modal">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-xs mx-4">
            <h4 class="text-center font-black text-[10px] mb-4 text-slate-400 uppercase tracking-widest italic">Assign to Table No.</h4>
            <div class="grid grid-cols-3 gap-2" id="modal-table-grid"></div>
            <button onclick="closeModal()" class="w-full mt-6 text-slate-400 text-[10px] font-bold uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script type="module">
        let menuItems = {}; let activeOrders = []; let cart = [];

        const toast = (msg) => {
            const el = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            el.classList.add('show', 'opacity-100');
            setTimeout(() => el.classList.remove('show', 'opacity-100'), 2500);
        };

        // --- CLOUD SYNC ---
        window.addEventListener('load', () => {
            document.getElementById('cloud-status').className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
            
            window.dbOnValue(window.dbRef(window.db, 'menu'), (snap) => {
                menuItems = snap.val() || {};
                renderPOS(); renderMenuMan();
            });

            window.dbOnValue(window.dbRef(window.db, 'orders'), (snap) => {
                activeOrders = snap.val() ? Object.entries(snap.val()).map(([id, v]) => ({ id, ...v })) : [];
                renderKitchen(); renderBilling();
            });

            window.dbOnValue(window.dbRef(window.db, 'history'), (snap) => {
                const data = snap.val() ? Object.values(snap.val()) : [];
                const rev = data.reduce((s,o)=>s+o.total, 0);
                document.getElementById('header-rev').innerText = rev;
                document.getElementById('ins-total').innerText = rev;
                document.getElementById('settle-history').innerHTML = data.map(h => `<tr class="border-b"><td class="p-4 font-black italic uppercase">${h.table}</td><td class="p-4 text-slate-400 font-bold uppercase tracking-tighter">${h.items}</td><td class="p-4 font-black text-blue-600 italic">₹${h.total}</td></tr>`).reverse().join('');
            });
        });

        // --- MENU ACTIONS ---
        window.addDishToCloud = () => {
            const name = document.getElementById('new-name').value;
            const price = parseInt(document.getElementById('new-price').value);
            if(name && price) {
                window.dbPush(window.dbRef(window.db, 'menu'), { name, price });
                document.getElementById('new-name').value = ''; document.getElementById('new-price').value = '';
                toast("Dish Added to Cloud!");
            }
        };
        window.deleteFromLibrary = (key) => {
            if(confirm("Permanently Delete from Menu?")) {
                window.dbRemove(window.dbRef(window.db, `menu/${key}`));
                toast("Deleted!");
            }
        };

        // --- CART ACTIONS ---
        window.addToCart = (name, price) => { cart.push({name, price}); updateCart(); };
        window.removeFromCart = (i) => { cart.splice(i, 1); updateCart(); };
        function updateCart() {
            document.getElementById('cart-list').innerHTML = cart.map((c, i)=>`<div class="flex justify-between p-1.5 border-b text-[9px] font-black bg-slate-50 rounded mb-1"><span>${c.name}</span><div class="flex items-center gap-2"><span>₹${c.price}</span><button onclick="removeFromCart(${i})" class="text-red-400"><i class="fa-solid fa-circle-xmark"></i></button></div></div>`).join('');
            document.getElementById('cart-total').innerText = cart.reduce((s,i)=>s+i.price, 0);
        }
        window.clearCart = () => { cart = []; updateCart(); };

        // --- ORDER ACTIONS ---
        window.placeOrder = (tNo) => {
            const tName = `T${tNo}`;
            window.dbPush(window.dbRef(window.db, 'orders'), { table:tName, items:cart, status:'pending' });
            cart=[]; updateCart(); closeModal(); toast(`Order sent for ${tName}!`);
        };
        window.cancelOrder = (id) => {
            if(confirm("Cancel this Entire Order?")) {
                window.dbRemove(window.dbRef(window.db, `orders/${id}`));
                toast("Order Cancelled!");
            }
        };
        window.nextStatus = (id, cur) => {
            const next = {pending:'preparing', preparing:'ready', ready:'served'}[cur];
            window.dbUpdate(window.dbRef(window.db, `orders/${id}`), { status: next });
        };

        // --- BILLING ACTIONS ---
        window.settle = (tName) => {
            const tOrders = activeOrders.filter(o => o.table === tName && o.status === 'served');
            let items = []; tOrders.forEach(o => items.push(...o.items));
            const total = Math.round(items.reduce((s,i)=>s+i.price, 0) * 1.05);

            window.dbPush(window.dbRef(window.db, 'history'), { table:tName, items:items.map(i=>i.name).join(', '), total:total });
            tOrders.forEach(o => window.dbRemove(window.dbRef(window.db, `orders/${o.id}`)));
            document.getElementById('bill-panel').innerHTML = `<div class="text-green-500 font-black text-xl italic text-center">SESSION SETTLED ✓</div>`;
            toast(`${tName} Settled!`);
        }

        // --- RENDERERS ---
        function renderPOS() {
            document.getElementById('menu-grid').innerHTML = Object.values(menuItems).map(m=>`
                <div onclick="addToCart('${m.name}', ${m.price})" class="dish-btn bg-white p-3 rounded-xl text-center shadow-sm">
                    <p class="font-bold text-[9px] uppercase h-6 overflow-hidden mb-1">${m.name}</p>
                    <p class="text-blue-600 font-black text-xs">₹${m.price}</p>
                </div>`).join('');
        }
        function renderMenuMan() {
            document.getElementById('menu-man-list').innerHTML = Object.entries(menuItems).map(([key, m]) => `
                <div class="bg-white p-3 rounded-xl border flex justify-between items-center text-[10px] font-black uppercase italic">
                    <span>${m.name}</span><div class="flex items-center gap-4"><span class="text-blue-600 font-black">₹${m.price}</span><button onclick="deleteFromLibrary('${key}')" class="text-red-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></div>
                </div>`).join('');
        }
        function renderKitchen() {
            ['pending','preparing','ready','served'].forEach(id => document.getElementById('col-'+id).innerHTML = '');
            activeOrders.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl border-l-4 border-blue-600 shadow-sm text-[10px]";
                card.innerHTML = `<div class="flex justify-between items-center mb-1"><div class="font-black uppercase">${o.table}</div><button onclick="cancelOrder('${o.id}')" class="text-slate-300 hover:text-red-400"><i class="fa-solid fa-circle-x"></i></button></div>
                    <p class="text-slate-400 font-bold mb-3 uppercase tracking-tighter">${o.items.map(i=>i.name).join(', ')}</p>
                    ${o.status!=='served' ? `<button onclick="nextStatus('${o.id}', '${o.status}')" class="w-full bg-slate-900 text-white p-2 rounded-lg font-black text-[9px] uppercase tracking-widest">Next State</button>` : '<b class="text-green-600 italic">Served ✓</b>'}`;
                document.getElementById('col-'+o.status).appendChild(card);
            });
        }
        function renderBilling() {
            const served = activeOrders.filter(o => o.status === 'served');
            const unique = [...new Set(served.map(o => o.table))];
            const list = document.getElementById('bill-table-list');
            if(!unique.length) return list.innerHTML = "<p class='text-[10px] text-slate-300 italic py-10 text-center font-black uppercase tracking-widest'>No Bills Pending</p>";
            list.innerHTML = unique.map(t => `<button onclick="showBill('${t}')" class="w-full bg-white border-2 border-transparent p-4 rounded-xl text-left font-black text-xs hover:border-blue-500 shadow-sm transition"><i class="fa-solid fa-receipt text-blue-500 mr-2"></i> ${t} MERGED BILL</button>`).join('');
        }
        window.showBill = (tName) => {
            const tables = activeOrders.filter(o => o.table === tName && o.status === 'served');
            let items = []; tables.forEach(o => items.push(...o.items));
            const sub = items.reduce((s,i)=>s+i.price, 0); const gst = Math.round(sub * 0.05);
            document.getElementById('bill-panel').innerHTML = `
                <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl border">
                    <h3 class="text-xl font-black mb-1 text-blue-600 text-center italic tracking-widest">Demo Cloud Hub</h3>
                    <p class="text-[9px] font-black text-slate-400 mb-6 uppercase tracking-widest text-center">${tName} Final Invoice</p>
                    <div class="space-y-1 mb-6 border-b pb-4 max-h-32 overflow-y-auto">${items.map(i=>`<div class="flex justify-between text-[11px] font-bold"><span>${i.name}</span><span>₹${i.price}</span></div>`).join('')}</div>
                    <div class="text-right text-[10px] mb-8 font-black text-slate-400 uppercase tracking-widest italic tracking-widest"><p>Sub: ₹${sub}</p><p>Tax: ₹${gst}</p><h2 class="text-3xl font-black text-blue-600 mt-2 tracking-tighter italic">Total: ₹${sub+gst}</h2></div>
                    <button onclick="settle('${tName}')" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-black transition">Print & Settle</button>
                </div>`;
        }

        window.showView = (v) => {
            ['pos','kitchen','billing','insights','menu-man'].forEach(id => document.getElementById('view-'+id).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('nav-'+v).classList.add('active-nav');
            if(v === 'menu-man') renderMenuMan();
            document.getElementById('view-title').innerText = "CLOUD TERMINAL | " + v.toUpperCase();
        }

        window.openTableModal = () => {
            if(!cart.length) return;
            document.getElementById('modal-table-grid').innerHTML = Array.from({length:12}, (_,i)=>{
                const tName = `T${i+1}`;
                const isBusy = activeOrders.some(o => o.table === tName);
                const color = isBusy ? 'bg-orange-100 text-orange-500' : 'bg-slate-50 text-slate-700';
                return `<button onclick="placeOrder(${i+1})" class="${color} p-4 rounded-xl font-black text-sm shadow-sm border border-slate-100 transition shadow-sm">${tName}</button>`;
            }).join('');
            document.getElementById('table-modal').classList.add('show-modal');
        }
        window.closeModal = () => document.getElementById('table-modal').classList.remove('show-modal');
    </script>
</body>
    </html>
